name: rsi-governor-001-falsification-audit
on:
  workflow_dispatch:
    inputs:
      autonomous_artifact:
        description: Artifact name from autonomous run (optional for standalone fixture audit).
        required: false
        default: ''
        type: string
      out_dir:
        description: Output directory containing docket.
        required: false
        default: rsi-governor-runs/test
        type: string
  workflow_call:
    inputs:
      autonomous_artifact:
        required: true
        type: string
      out_dir:
        required: false
        type: string
        default: rsi-governor-runs/lifecycle
permissions:
  contents: read
  actions: read
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: cfg
        run: echo "out_dir=${{ inputs.out_dir || 'rsi-governor-runs/test' }}" >> $GITHUB_OUTPUT
      - uses: actions/download-artifact@v4
        if: ${{ inputs.autonomous_artifact != '' }}
        with:
          name: ${{ inputs.autonomous_artifact }}
          path: ${{ steps.cfg.outputs.out_dir }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m agialpha_rsi_governor falsification-audit --docket "${{ steps.cfg.outputs.out_dir }}/rsi-governor-evidence-docket"
