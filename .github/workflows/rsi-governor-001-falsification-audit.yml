name: rsi-governor-001-falsification-audit
on:
  workflow_dispatch:
    inputs:
      evidence_artifact_name:
        required: true
        default: rsi-governor-autonomous
      out_dir:
        required: false
        default: rsi-governor-runs/falsification
  workflow_call:
    inputs:
      evidence_artifact_name:
        required: true
        type: string
      out_dir:
        required: false
        type: string
        default: rsi-governor-runs/falsification
permissions:
  contents: read
  actions: read
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.evidence_artifact_name }}
          path: ${{ inputs.out_dir }}/rsi-governor-evidence-docket
      - run: python -m agialpha_rsi_governor falsification-audit --docket "${{ inputs.out_dir }}/rsi-governor-evidence-docket"
      - run: echo '{"falsification_source":"${{ inputs.evidence_artifact_name }}"}' > falsification_audit.json
      - uses: actions/upload-artifact@v4
        with:
          name: rsi-governor-falsification-${{ github.run_id }}
          path: falsification_audit.json
