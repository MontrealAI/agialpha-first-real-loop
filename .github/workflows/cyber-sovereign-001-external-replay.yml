name: AGI ALPHA Cybersecurity Sovereign 001 External Replay / L4

on:
  workflow_dispatch:
    inputs:
      source_dir:
        description: "Optional source directory to replay"
        required: false
        default: ""
  workflow_run:
    workflows: ["AGI ALPHA Cybersecurity Sovereign 001 / Autonomous"]
    types: [completed]

permissions:
  contents: read
  actions: read

jobs:
  external-replay:
    name: Clean defensive external replay check
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Try downloading prior Cybersecurity Sovereign artifact
        if: ${{ github.event_name == 'workflow_run' }}
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}
          pattern: cyber-sovereign-001-*
          merge-multiple: true
          path: downloaded-cyber-sovereign
      - name: Resolve source
        shell: bash
        run: |
          if [[ -n "${{ github.event.inputs.source_dir || '' }}" ]]; then
            SRC="${{ github.event.inputs.source_dir }}"
          elif [[ -d downloaded-cyber-sovereign ]]; then
            SRC="downloaded-cyber-sovereign"
          else
            SRC="evidence-docket"
          fi
          echo "SRC=$SRC" >> "$GITHUB_ENV"
          echo "OUT=runs/cyber-sovereign-external-replay/${{ github.run_id }}" >> "$GITHUB_ENV"
      - name: Run external replay report
        run: python -m agialpha_sovereign_capstone external-replay --source "$SRC" --out "$OUT"
      - name: Upload external replay artifact
        uses: actions/upload-artifact@v4
        with:
          name: cyber-sovereign-external-replay-${{ github.run_id }}
          path: ${{ env.OUT }}
          retention-days: 30
