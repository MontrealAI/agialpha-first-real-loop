name: AGI ALPHA Engine 001 / Falsification Audit
on: {workflow_dispatch: {}, schedule: [{cron: '0 6 * * 0'}]}
permissions: {contents: read, actions: read}
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - run: python -m agialpha_engine falsification-audit --run agialpha_engine_registry/runs/engine-run-001
