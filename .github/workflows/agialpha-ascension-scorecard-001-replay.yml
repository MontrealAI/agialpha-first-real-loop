name: AGI ALPHA Ascension Scorecard 001 / Replay
on: {workflow_dispatch: {}, schedule: [{cron: '0 9 * * 1'}]}
permissions: {contents: read, actions: read}
jobs:
  replay:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - run: python -m agialpha_ascension_scorecard replay --run ascension-scorecard-runs/latest
