name: AGI ALPHA ASCENSION-001 / Falsification Audit

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  falsification-audit:
    name: ASCENSION-001 falsification audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Generate fresh docket and run falsification audit
        shell: bash
        run: |
          set -euo pipefail
          OUT_DIR="runs/ascension-001-audit/${GITHUB_RUN_ID}"
          python -m agialpha_ascension_001 run --repo-root . --out "$OUT_DIR" --cycles 3 --task-count 9 --seed 1001
          python -m agialpha_ascension_001 audit --docket "$OUT_DIR/ascension-001-evidence-docket"
          echo "ASCENSION_OUT=$OUT_DIR" >> "$GITHUB_ENV"
      - name: Upload audit artifact
        uses: actions/upload-artifact@v4
        with:
          name: ascension-001-falsification-audit-${{ github.run_id }}
          path: |
            ${{ env.ASCENSION_OUT }}/
          retention-days: 30
