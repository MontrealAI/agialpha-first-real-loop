name: SecureRails Release Validate 001

on:
  pull_request:
    paths:
      - "releases/securerails/**"
      - "docs/secure-rails/**"
      - "secure_rails/**"
      - "schemas/securerails_release*.json"
      - "schemas/securerails_marketplace_readiness.schema.json"
      - "schemas/securerails_export_plan.schema.json"
      - "config/securerails_release*.json"
      - "config/securerails_marketplace_readiness_policy.json"
      - ".github/workflows/securerails-release*.yml"
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate release manifest examples
        run: python -m secure_rails release-train validate --input releases/securerails/securerails-0.1.0-rc1
      - name: Check no overclaim and token utility boundaries
        run: |
          python scripts/secure_rails_claim_boundary_check.py .
          python -m unittest tests/test_secure_rails_no_investment_language.py -v
          python -m unittest tests/test_secure_rails_token_utility_boundary.py -v
      - name: Check Marketplace readiness language
        run: python -m unittest tests/test_securerails_marketplace_readiness.py -v
      - name: Run release test suite
        run: |
          python -m unittest tests/test_securerails_release_manifest.py -v
          python -m unittest tests/test_securerails_release_bundle.py -v
          python -m unittest tests/test_securerails_release_notes.py -v
          python -m unittest tests/test_securerails_release_no_overclaim.py -v
          python -m unittest tests/test_securerails_release_workflows.py -v
      - name: Run full unit tests
        run: python -m unittest discover -s tests
