name: AGI ALPHA Cybersecurity Sovereign 001 Scaling / L6 Proxy

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["AGI ALPHA Cybersecurity Sovereign 001 / Autonomous"]
    types: [completed]

permissions:
  contents: read
  actions: read

jobs:
  scaling:
    name: Generate defensive agent/node scaling proxy
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Generate scaling matrix
        run: python -m agialpha_sovereign_capstone scaling --out runs/cyber-sovereign-scaling/${{ github.run_id }}
      - name: Upload scaling artifact
        uses: actions/upload-artifact@v4
        with:
          name: cyber-sovereign-scaling-${{ github.run_id }}
          path: runs/cyber-sovereign-scaling/${{ github.run_id }}
          retention-days: 30
