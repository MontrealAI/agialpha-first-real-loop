name: agialpha-self-improvement-gauntlet-001.yml
on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 0"
permissions:
  contents: read
  actions: read
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m agialpha_ascension_os run-gauntlet --repo-root . --out ascension-os-runs/test --task-count 12
