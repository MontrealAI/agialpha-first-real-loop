name: SecureRails Dependency Review 001
on:
  pull_request:
    paths:
      - "**/requirements.txt"
      - "**/pyproject.toml"
      - "**/poetry.lock"
      - "**/package.json"
      - "**/package-lock.json"
      - "**/yarn.lock"
      - "**/pnpm-lock.yaml"
      - "**/go.mod"
      - "**/go.sum"
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - "**/Gemfile"
      - "**/Gemfile.lock"
      - "**/pom.xml"
      - "**/build.gradle"
      - "**/gradle.lockfile"
      - ".github/workflows/**"
  workflow_dispatch:
permissions:
  contents: read
  pull-requests: read
jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Dependency review (advisory)
        uses: actions/dependency-review-action@v4
        continue-on-error: true
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: python -m secure_rails repo-security inventory --repo-root . --out dependency_inventory.json
      - uses: actions/upload-artifact@v4
        with:
          name: securerails-dependency-review-001
          path: dependency_inventory.json
