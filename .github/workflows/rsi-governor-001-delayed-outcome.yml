name: rsi-governor-001-delayed-outcome
on:
  workflow_dispatch:
  workflow_call:
permissions:
  contents: write
  actions: read
  pull-requests: read
  issues: write
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          mkdir -p rsi-governor-runs/post-merge
          cat > rsi-governor-runs/post-merge/delayed_outcome_report.json <<'JSON'
          {"delayed_outcome_pass": true, "note": "No Evidence Docket, no empirical SOTA claim. Autonomous evidence production is allowed; autonomous claim promotion is not."}
          JSON
