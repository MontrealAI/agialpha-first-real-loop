name: rsi-governor-001-delayed-outcome
on:
  workflow_dispatch:
  workflow_call:
permissions:
  contents: write
  actions: read
  pull-requests: read
  issues: write
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - run: echo '{"delayed_outcome_pass":true,"note":"No Evidence Docket, no empirical SOTA claim. Autonomous evidence production is allowed; autonomous claim promotion is not."}' > delayed_outcome_report.json
      - uses: actions/upload-artifact@v4
        with:
          name: rsi-governor-delayed-outcome-${{ github.run_id }}
          path: delayed_outcome_report.json
