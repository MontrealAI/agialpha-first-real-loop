name: RSI Forge 001 Safe PR
name: AGI ALPHA RSI-FORGE-001 / Safe PR Proposal

on:
  workflow_dispatch:
    inputs:
      cycles:
        description: "Cycle scope"
        required: false
        default: "1"
permissions:
  contents: read
  pull-requests: read
jobs:
  safe-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "Safe PR proposal is human-governed and bounded."
        description: "Cycles to run before proposing accepted kernel"
        required: false
        default: "6"

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  safe-pr:
    name: Open human-reviewed PR with accepted RSI kernel
    runs-on: ubuntu-latest
    env:
      OUT_DIR: runs/rsi-forge-001-pr/${{ github.run_id }}
      BRANCH: rsi-forge-001/proposal-${{ github.run_id }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Generate RSI evidence
        shell: bash
        run: |
          set -euo pipefail
          python -m agialpha_rsi_forge_001 run --out "$OUT_DIR" --cycles "${{ github.event.inputs.cycles || '6' }}"
          python -m agialpha_rsi_forge_001 replay --docket "$OUT_DIR"
          python -m agialpha_rsi_forge_001 audit --docket "$OUT_DIR"
          python -m agialpha_rsi_forge_001 vnext --docket "$OUT_DIR"
      - name: Prepare safe proposal files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p accepted_capabilities/rsi-forge-001 docs/rsi-forge-001
          cp "$OUT_DIR/03_kernel_lineage/accepted_kernel_v${{ github.event.inputs.cycles || '6' }}.py" accepted_capabilities/rsi-forge-001/accepted_evidence_kernel.py
          cp "$OUT_DIR/15_summary_tables/summary.json" accepted_capabilities/rsi-forge-001/summary.json
          cp "$OUT_DIR/scoreboard.html" docs/rsi-forge-001/index.html
          cat > accepted_capabilities/rsi-forge-001/README.md <<'MD'
          # RSI-FORGE-001 accepted kernel proposal

          This PR proposes adding the accepted Evidence Kernel generated by RSI-FORGE-001.

          Claim boundary: this is bounded, repo-owned CI/proxy evidence. It does not claim achieved AGI, ASI, empirical SOTA, safe autonomy, or external validation.

          Human review is required. This workflow does not auto-merge.
          MD
      - name: Create PR
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git config user.name "agi-alpha-rsi-forge[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add accepted_capabilities/rsi-forge-001 docs/rsi-forge-001
          git commit -m "Add RSI-FORGE-001 accepted Evidence Kernel proposal"
          git push --set-upstream origin "$BRANCH"
          gh pr create             --title "RSI-FORGE-001 accepted Evidence Kernel proposal"             --body "This human-reviewed PR was generated by RSI-FORGE-001. It does not auto-merge. Review gates: replay, falsification audit, vNext transfer, claim boundary, hard safety counters."             --head "$BRANCH"             --base main || true
      - uses: actions/upload-artifact@v4
        with:
          name: rsi-forge-001-safe-pr-${{ github.run_id }}
          path: ${{ env.OUT_DIR }}
          retention-days: 30
