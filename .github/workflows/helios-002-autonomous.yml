name: AGI ALPHA HELIOS-002 / Autonomous

on:
  workflow_dispatch:
    inputs:
      output_dir:
        description: "Output directory for HELIOS-002 evidence"
        required: false
        default: ""
      source_evidence_docket:
        description: "Source Evidence Docket path, usually evidence-docket"
        required: false
        default: "evidence-docket"
      publish_pages:
        description: "Publish HELIOS-002 scoreboard to GitHub Pages"
        type: boolean
        required: false
        default: true
  schedule:
    - cron: "23 7 * * *"
  push:
    branches: ["main"]
    paths:
      - "agialpha_helios2/**"
      - "config/helios_002_config.json"
      - "evidence-docket/**"
      - ".github/workflows/helios-002-autonomous.yml"
      - "tests/**"

permissions:
  contents: read
  actions: read
  pages: write
  id-token: write

concurrency:
  group: helios-002-${{ github.ref }}
  cancel-in-progress: false

env:
  PYTHONUNBUFFERED: "1"
  PUBLISH_PAGES: ${{ inputs.publish_pages || 'true' }}
  SOURCE_EVIDENCE_DOCKET: ${{ inputs.source_evidence_docket || 'evidence-docket' }}

jobs:
  helios-002:
    name: Generate HELIOS-002 evidence, replay, falsify, and publish
    runs-on: ubuntu-latest
    outputs:
      output_dir: ${{ steps.paths.outputs.output_dir }}
      docs_dir: ${{ steps.paths.outputs.docs_dir }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Resolve paths
        id: paths
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ inputs.output_dir }}" ]]; then
            OUT_DIR="${{ inputs.output_dir }}"
          else
            OUT_DIR="runs/helios-002/${GITHUB_RUN_ID}"
          fi
          DOCS_DIR="docs"
          echo "output_dir=${OUT_DIR}" >> "$GITHUB_OUTPUT"
          echo "docs_dir=${DOCS_DIR}" >> "$GITHUB_OUTPUT"
          echo "OUT_DIR=${OUT_DIR}" >> "$GITHUB_ENV"
          echo "DOCS_DIR=${DOCS_DIR}" >> "$GITHUB_ENV"

      - name: Run tests if present
        shell: bash
        run: |
          set -euo pipefail
          if [[ -d tests ]]; then
            python -m unittest discover -s tests
          else
            echo "No tests directory present; skipping."
          fi

      - name: Run HELIOS-002 autonomous experiment
        shell: bash
        run: |
          set -euo pipefail
          python -m agialpha_helios2 run --out "$OUT_DIR" --source "$SOURCE_EVIDENCE_DOCKET" --docs "$DOCS_DIR"

      - name: Upload HELIOS-002 evidence artifact
        uses: actions/upload-artifact@v7
        with:
          name: helios-002-evidence-${{ github.run_id }}
          path: ${{ env.OUT_DIR }}
          retention-days: 30
          if-no-files-found: error

      - name: Prepare merged Pages content
        if: ${{ env.PUBLISH_PAGES == 'true' && github.ref_name == 'main' }}
        shell: bash
        run: |
          set -euo pipefail
          rm -rf _pages && mkdir -p _pages
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null; then
            git fetch origin gh-pages:gh-pages
            git --work-tree _pages checkout gh-pages -- .
          fi
          rm -rf _pages/helios-002
          mkdir -p _pages/helios-002
          cp -a "${DOCS_DIR}/." "_pages/helios-002/"
      - name: Upload GitHub Pages artifact
        if: ${{ env.PUBLISH_PAGES == 'true' && github.ref_name == 'main' }}
        uses: actions/upload-artifact@v4
        with:
          path: _pages

  deploy-pages:
    name: Publish HELIOS-002 scoreboard to GitHub Pages
    if: ${{ false }}
    needs: helios-002
    runs-on: ubuntu-latest
    concurrency:
      group: pages-publish-main
      cancel-in-progress: false
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/upload-artifact@v4
        with:
          path: .
