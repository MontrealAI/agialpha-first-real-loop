name: AGI ALPHA RSI-FORGE-001 / Independent Replay

on:
  workflow_dispatch:
    inputs:
      cycles:
        description: "Cycles to regenerate for clean replay"
        required: false
        default: "6"
      seed:
        description: "Deterministic seed"
        required: false
        default: "1001"

permissions:
  contents: read
  actions: read

jobs:
  replay:
    name: Clean replay of RSI-FORGE-001
    runs-on: ubuntu-latest
    env:
      OUT_DIR: runs/rsi-forge-001-replay/${{ github.run_id }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Regenerate deterministic docket and replay it
        shell: bash
        run: |
          set -euo pipefail
          python -m agialpha_rsi_forge_001 run --out "$OUT_DIR" --cycles "${{ github.event.inputs.cycles || '6' }}" --seed "${{ github.event.inputs.seed || '1001' }}"
          python -m agialpha_rsi_forge_001 replay --docket "$OUT_DIR"
      - uses: actions/upload-artifact@v4
        with:
          name: rsi-forge-001-independent-replay-${{ github.run_id }}
          path: ${{ env.OUT_DIR }}
          retention-days: 30
