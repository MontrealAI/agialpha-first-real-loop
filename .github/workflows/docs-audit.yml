name: docs-audit
on:
  pull_request:
  push:
    branches: [main]
    paths: ['docs/**','.github/workflows/**','schemas/**','scripts/**','README*.md']
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'
jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m agialpha_docs inventory --repo-root . --out docs/_generated/inventory.json
      - run: python -m agialpha_docs audit-workflows --repo-root .
      - run: python -m agialpha_docs audit-links --repo-root .
      - run: python -m agialpha_docs audit-claims --repo-root .
      - run: python -m agialpha_docs audit-readmes --repo-root .
      - run: python -m unittest discover -s tests
      - uses: actions/upload-artifact@v4
        with:
          name: docs-audit
          path: docs/_generated
