name: AGI ALPHA Recursive Substrate 002 / Lifecycle
on:
  workflow_dispatch:
    inputs:
      candidate_seeds:
        default: "16"
      evaluate_seeds:
        default: "6"
      publish_recursive_tab:
        default: "true"
  schedule:
    - cron: "0 17 * * 1"
permissions:
  contents: read
  actions: read
jobs:
  recursive-substrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python scripts/secure_rails_claim_boundary_check.py .
      - run: python -m agialpha_recursive_substrate discover --repo-root . --registry recursive_substrate_registry
      - run: python -m agialpha_recursive_substrate run-cycle --repo-root . --registry recursive_substrate_registry --out recursive-substrate-runs/test --candidate-seeds ${{ github.event.inputs.candidate_seeds || '16' }} --evaluate-seeds ${{ github.event.inputs.evaluate_seeds || '6' }}
      - run: python -m agialpha_recursive_substrate replay --input recursive-substrate-runs/test --out recursive-substrate-runs/test/replay_report.json
      - run: python -m agialpha_recursive_substrate falsification-audit --input recursive-substrate-runs/test --out recursive-substrate-runs/test/falsification_audit.json
      - run: python -m agialpha_recursive_substrate validate --input recursive-substrate-runs/test
      - run: python -m agialpha_recursive_substrate build-data --registry recursive_substrate_registry --out docs/_generated/recursive-substrate
      - uses: actions/upload-artifact@v4
        with:
          name: recursive-substrate
          path: recursive-substrate-runs/test
