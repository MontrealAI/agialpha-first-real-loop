name: AGI ALPHA Engine 001 / Self-Improvement Gauntlet
on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * 0"
permissions:
  contents: read
  actions: read
jobs:
  gauntlet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m agialpha_engine run-gauntlet --repo-root . --out /tmp/agialpha-engine-gauntlet --task-count 16
