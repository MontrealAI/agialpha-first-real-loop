name: rsi-governor-001-safe-pr
on:
  workflow_dispatch:
  workflow_call:
permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: read
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - run: echo '{"status":"prepared","auto_merge":false}' > pr_status.json
      - uses: actions/upload-artifact@v4
        with:
          name: rsi-governor-safe-pr-${{ github.run_id }}
          path: pr_status.json
