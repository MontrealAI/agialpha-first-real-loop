name: rsi-governor-001-safe-pr
on:
  workflow_dispatch:
  workflow_call:
    inputs:
      autonomous_artifact:
        required: false
        type: string
permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: read
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Safe PR gate reached. Human review required. No auto-merge."
