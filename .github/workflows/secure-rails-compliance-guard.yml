name: SecureRails Compliance Guard

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'docs/secure-rails/**'
      - 'schemas/**'
      - 'config/securerails_*.json'
      - 'scripts/secure_rails_*.py'
      - '.github/workflows/secure-rails-compliance-guard.yml'
  push:
    paths:
      - 'docs/secure-rails/**'
      - 'schemas/**'
      - 'config/securerails_*.json'
      - 'scripts/secure_rails_*.py'

permissions:
  contents: read

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Claim boundary check
        run: python scripts/secure_rails_claim_boundary_check.py .
      - name: Safety ledger check
        run: python scripts/secure_rails_safety_ledger_check.py docs/secure-rails/templates/safety-ledger-example.json
      - name: No auto-merge check
        run: python scripts/secure_rails_no_automerge_check.py .
      - name: Default use-case triage check
        run: python scripts/secure_rails_use_case_triage_check.py docs/secure-rails/templates/deployment-intake-example.json
      - name: SecureRails registry discover
        run: python -m secure_rails discover --repo-root . --registry secure_rails_registry
      - name: SecureRails registry validate
        run: python -m secure_rails validate-registry --registry secure_rails_registry
      - name: SecureRails UI data build
        run: python -m secure_rails build-data --registry secure_rails_registry --out docs/_generated/secure-rails
      - name: SecureRails token boundary check
        run: python -m secure_rails check-token-boundary --repo-root .
      - name: SecureRails work vault registry check
        run: python -m secure_rails check-work-vaults --registry secure_rails_registry
      - name: Work Vault checks
        run: |
          python scripts/secure_rails_work_vault_check.py docs/secure-rails/templates/work-vault-example.json
          python scripts/secure_rails_work_vault_check.py docs/secure-rails/templates/mark-allocation-example.json
          python scripts/secure_rails_work_vault_check.py docs/secure-rails/templates/sovereign-example.json
          python scripts/secure_rails_work_vault_check.py docs/secure-rails/templates/vault-settlement-example.json
