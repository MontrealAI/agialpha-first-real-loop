name: agialpha-engine-001-open-rsi-eval.yml
on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 0"
permissions:
  contents: read
  actions: read
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python -m agialpha_engine discover --repo-root . --registry engine_registry
