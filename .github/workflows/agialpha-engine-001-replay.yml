name: AGI ALPHA Engine 001 / Replay
on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * 0"
permissions:
  contents: read
  actions: read
jobs:
  replay:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m agialpha_engine run-cycle --repo-root . --registry engine_registry --out /tmp/agialpha-engine-replay --candidate-tasks 16 --evaluate-tasks 6 --variants-per-task 2
      - run: python -m agialpha_engine replay --run /tmp/agialpha-engine-replay
