name: AGI ALPHA Engine 001 / vNext Candidates
on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 0"
permissions:
  contents: read
  actions: read
jobs:
  vnext:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m agialpha_engine run-cycle --repo-root . --registry engine_registry --out /tmp/agialpha-engine-vnext --candidate-tasks 32 --evaluate-tasks 12 --variants-per-task 3
      - run: python -m agialpha_engine validate --run /tmp/agialpha-engine-vnext
