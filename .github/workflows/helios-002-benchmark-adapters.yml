name: AGI ALPHA HELIOS-002 Benchmark Adapters / Autonomous

on:
  workflow_dispatch:
    inputs:
      publish_pages:
        description: "Publish adapter-readiness report to GitHub Pages"
        type: boolean
        required: false
        default: false
  workflow_run:
    workflows: ["AGI ALPHA HELIOS-002 / Autonomous"]
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

env:
  PYTHONUNBUFFERED: "1"
  PUBLISH_PAGES: ${{ inputs.publish_pages || 'false' }}

jobs:
  adapters:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    name: Generate HELIOS-002 public benchmark adapter templates
    runs-on: ubuntu-latest
    outputs:
      docs_dir: ${{ steps.paths.outputs.docs_dir }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Resolve paths
        id: paths
        shell: bash
        run: |
          set -euo pipefail
          OUT_DIR="runs/helios-002-benchmark-adapters/${GITHUB_RUN_ID}"
          DOCS_DIR="docs"
          echo "OUT_DIR=${OUT_DIR}" >> "$GITHUB_ENV"
          echo "DOCS_DIR=${DOCS_DIR}" >> "$GITHUB_ENV"
          echo "docs_dir=${DOCS_DIR}" >> "$GITHUB_OUTPUT"
      - name: Generate adapter templates
        shell: bash
        run: python -m agialpha_helios2 adapters --out "$OUT_DIR" --docs "$DOCS_DIR"
      - name: Upload adapter artifact
        uses: actions/upload-artifact@v7
        with:
          name: helios-002-benchmark-adapters-${{ github.run_id }}
          path: ${{ env.OUT_DIR }}
          retention-days: 30
          if-no-files-found: error
      - name: Upload experiment bundle artifact
        if: ${{ env.PUBLISH_PAGES == 'true' && github.ref_name == 'main' }}
        uses: actions/upload-artifact@v4
        with:
          path: ${{ env.DOCS_DIR }}

  notify-evidence-hub:
    if: ${{ false }}
    needs: adapters
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/upload-artifact@v4
