name: rsi-governor-001-replay
on:
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m agialpha_rsi_governor replay --docket rsi-governor-runs/test/rsi-governor-evidence-docket
