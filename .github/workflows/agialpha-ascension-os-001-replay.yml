name: agialpha-ascension-os-001-replay.yml
on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 0"
permissions:
  contents: read
  actions: read
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m agialpha_ascension_os run-cycle --repo-root . --registry ascension_os_registry --out ascension-os-runs/test --candidate-seeds 16 --evaluate-seeds 6
      - run: python -m agialpha_ascension_os replay --run ascension-os-runs/test
