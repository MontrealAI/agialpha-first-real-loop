name: AGI ALPHA AGI-GA Foundry 001 / Foundry Kernel Safe PR

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  safe-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare safe policy PR artifact
        run: |
          python -m agialpha_agiga_foundry lifecycle --repo-root . --cycles 1 --candidate-niches 16 --evaluate-niches 6 --local-variants-per-niche 3 --out agiga-foundry-runs/safe-policy-pr
          echo "No Evidence Docket, no empirical SOTA claim. Autonomous evidence production is allowed; autonomous claim promotion is not."

      - name: Upload policy candidate artifact
        uses: actions/upload-artifact@v4
        with:
          name: agiga-foundry-001-foundry-kernel-safe-pr
          path: agiga-foundry-runs/safe-policy-pr/agiga-foundry-evidence-docket/12_foundry_kernel_rsi

      - name: Materialize promotion proposal file
        run: |
          mkdir -p docs/agiga-foundry
          DOSSIER="agiga-foundry-runs/safe-policy-pr/agiga-foundry-evidence-docket/12_foundry_kernel_rsi/promotion_dossier.md"
          LOCK="agiga-foundry-runs/safe-policy-pr/agiga-foundry-evidence-docket/12_foundry_kernel_rsi/candidate_lock_manifest.json"
          OUT="docs/agiga-foundry/foundry-kernel-promotion-${{ github.run_id }}.md"
          {
            echo "# AGI-GA-FOUNDRY-001 Foundry Kernel Promotion Proposal"
            echo
            echo "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo
            echo "No Evidence Docket, no empirical SOTA claim. Autonomous evidence production is allowed; autonomous claim promotion is not."
            echo
            echo "## Safety lane"
            echo "- Human review required."
            echo "- No auto-merge."
            echo "- Replay and falsification must pass before any promotion."
            echo
            if [ -f "$DOSSIER" ]; then
              echo "## Promotion dossier"
              sed -n '1,200p' "$DOSSIER"
            else
              echo "## Promotion dossier"
              echo "Not generated by this run; review artifact outputs."
            fi
            echo
            if [ -f "$LOCK" ]; then
              echo "## Candidate lock manifest"
              cat "$LOCK"
            else
              echo "## Candidate lock manifest"
              echo "Unavailable in working copy; see uploaded artifact."
            fi
          } > "$OUT"

      - name: Open review PR (never auto-merge)
        uses: peter-evans/create-pull-request@v6
        with:
          branch: agiga-foundry-001-foundry-kernel-safe-pr-${{ github.run_id }}
          delete-branch: true
          commit-message: "Add AGI-GA Foundry kernel promotion proposal for run ${{ github.run_id }}"
          title: "AGI-GA-FOUNDRY-001 Foundry Kernel promotion proposal (run ${{ github.run_id }})"
          body: |
            This PR was generated by the AGI-GA Foundry safe promotion workflow.

            - Evidence artifact: `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`
            - Human review required
            - No auto-merge

            No Evidence Docket, no empirical SOTA claim. Autonomous evidence production is allowed; autonomous claim promotion is not.
          add-paths: |
            docs/agiga-foundry/foundry-kernel-promotion-*.md
          labels: |
            agiga-foundry
            human-review-required
