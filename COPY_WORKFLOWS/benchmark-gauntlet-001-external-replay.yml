name: AGI ALPHA Benchmark Gauntlet 001 / External Replay L4

on:
  workflow_dispatch:
    inputs:
      challenge_dir:
        description: "External challenge pack directory"
        required: false
        default: "external_challenge_packs"
  workflow_run:
    workflows: ["AGI ALPHA Benchmark Gauntlet 001 / Autonomous"]
    types: [completed]

permissions:
  contents: read
  actions: read

jobs:
  external-replay:
    name: Clean-checkout replay and falsification audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: External replay from clean checkout
        shell: bash
        run: |
          set -euo pipefail
          CHALLENGE_DIR="${{ github.event.inputs.challenge_dir || 'external_challenge_packs' }}"
          OUT="runs/external-replay-${GITHUB_RUN_ID}"
          python -m agialpha_benchmark_gauntlet run --out "$OUT" --challenge-dir "$CHALLENGE_DIR"
          python -m agialpha_benchmark_gauntlet replay --docket "$OUT/benchmark-gauntlet-001-evidence-docket"
          python -m agialpha_benchmark_gauntlet falsification-audit --docket "$OUT/benchmark-gauntlet-001-evidence-docket"
          mkdir -p external-review
          cp -R "$OUT/benchmark-gauntlet-001-evidence-docket" external-review/
          cp "$OUT/benchmark-gauntlet-001-evidence-docket/13_external_reviewer_kit/ATTESTATION_TEMPLATE.md" external-review/ATTESTATION_TEMPLATE.md

      - name: Upload external replay artifact
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-gauntlet-001-external-replay-${{ github.run_id }}
          path: external-review
          retention-days: 30
